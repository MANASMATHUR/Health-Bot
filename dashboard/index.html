<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalorAI — Analytics Performance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #121212;
      --surface-hover: #1a1a1a;
      --card-bg: rgba(20, 20, 20, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #22c55e;
      --accent-glow: rgba(34, 197, 94, 0.2);
      --purple: #8b5cf6;
      --font: 'Outfit', -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 20% 20%, rgba(34, 197, 94, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
    }

    header {
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-container { display: flex; align-items: center; gap: 12px; }
    .logo-circle { width: 32px; height: 32px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent-glow); }
    .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }

    .header-actions { display: flex; align-items: center; gap: 20px; }
    #last-updated { font-size: 13px; color: var(--muted); font-weight: 400; }
    #refresh-btn { 
      background: #fff; color: #000; border: none; border-radius: 99px; 
      padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #refresh-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(255,255,255,0.2); }

    main { max-width: 1200px; margin: 0 auto; padding: 48px 40px; }
    
    .hero-section { margin-bottom: 48px; }
    h1 { font-size: 42px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; background: linear-gradient(to bottom, #fff, #999); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: var(--muted); font-size: 16px; font-weight: 400; }

    /* KPI Grid */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
    
    .kpi-card { 
      background: var(--card-bg); 
      backdrop-filter: blur(10px); 
      -webkit-backdrop-filter: blur(10px);
      padding: 24px; 
      border-radius: 20px; 
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }
    .kpi-card:hover { border-color: var(--border-hover); background: var(--surface-hover); transform: translateY(-2px); }
    
    .kpi-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .kpi-value { font-size: 36px; font-weight: 800; color: #fff; line-height: 1; }
    .kpi-trend { font-size: 13px; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
    .trend-up { color: var(--accent); }
    .trend-neutral { color: var(--muted); }

    /* Content Grid */
    .main-grid { display: grid; grid-template-columns: 8fr 4fr; gap: 24px; }
    @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; } }

    .card { 
      background: var(--card-bg); 
      backdrop-filter: blur(10px); 
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border); 
      border-radius: 24px; 
      padding: 32px; 
    }
    .card-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; }
    .card-tag { font-size: 11px; font-weight: 700; background: var(--border); padding: 4px 10px; border-radius: 99px; color: var(--muted); }

    /* Funnel Design */
    .funnel-list { display: flex; flex-direction: column; gap: 16px; }
    .funnel-item { position: relative; }
    .funnel-row { display: flex; align-items: center; gap: 16px; position: relative; z-index: 2; height: 32px; }
    .funnel-name { font-size: 13px; font-weight: 500; color: var(--muted); width: 120px; text-transform: capitalize; }
    .funnel-track { flex: 1; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; position: relative; }
    .funnel-fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 2px; background: var(--accent); box-shadow: 0 0 10px rgba(34, 197, 94, 0.4); transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); }
    .funnel-stats { font-size: 13px; font-weight: 600; width: 40px; color: #fff; text-align: right; }
    .funnel-pct { font-size: 11px; color: var(--muted); width: 40px; text-align: right; }

    /* Skeletons */
    .skeleton-bar { height: 12px; background: var(--border); border-radius: 6px; margin-bottom: 12px; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

    .error-toast { background: #fef2f2; border: 1px solid #fee2e2; border-radius: 12px; padding: 12px 20px; color: #991b1b; font-size: 14px; position: fixed; bottom: 24px; right: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

<header>
  <div class="logo-container">
    <div class="logo-circle"></div>
    <span class="logo-text">CalorAI</span>
  </div>
  <div class="header-actions">
    <span id="last-updated">Synchronizing...</span>
    <button id="refresh-btn" onclick="loadData()">Refresh Dashboard</button>
  </div>
</header>

<main>
  <div class="hero-section">
    <h1>System Intelligence</h1>
    <p class="subtitle">Predictive analytics and A/B performance metrics</p>
  </div>

  <div id="error-container"></div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Active Users</div>
      <div class="kpi-value" id="kpi-total">—</div>
      <div class="kpi-trend trend-neutral">System baseline</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Control Group</div>
      <div class="kpi-value" style="color:var(--purple)" id="kpi-control">—</div>
      <div class="kpi-trend" id="kpi-control-pct">Calculating...</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Test Group</div>
      <div class="kpi-value" style="color:var(--accent)" id="kpi-test">—</div>
      <div class="kpi-trend" id="kpi-test-pct">Calculating...</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Onboarding Vel.</div>
      <div class="kpi-value" id="kpi-onboarding">—</div>
      <div class="kpi-trend trend-up">Leading Indicator</div>
    </div>
  </div>

  <div class="main-grid">
    <div class="card">
      <div class="card-title">
        Activity Volume
        <span class="card-tag">7 Day Window</span>
      </div>
      <div style="height: 300px">
        <canvas id="mealsChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Onboarding Funnel</div>
      <div class="funnel-list" id="funnel-container">
        <div class="skeleton-bar" style="width: 80%"></div>
        <div class="skeleton-bar" style="width: 60%"></div>
        <div class="skeleton-bar" style="width: 40%"></div>
      </div>
    </div>
  </div>
</main>

<script>
  const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:3001'
    : '';

  let mealsChart = null;

  async function loadData() {
    try {
      const res = await fetch(`${API_BASE}/api/analytics/dashboard`);
      if (!res.ok) throw new Error(`Status ${res.status}`);
      const data = await res.json();
      render(data);
      document.getElementById('last-updated').textContent =
        'Live · Last updated ' + new Date().toLocaleTimeString('en-US', { hour12: false });
    } catch (err) {
      console.error(err);
      const container = document.getElementById('error-container');
      container.innerHTML = `<div class="error-toast">⚠️ API connection lost. Please verify local server is active.</div>`;
      setTimeout(() => container.innerHTML = '', 5000);
    }
  }

  function render(data) {
    const { dailyMeals, abDistribution, onboardingFunnel } = data;

    const total = (abDistribution.control || 0) + (abDistribution.test || 0);
    const testUsers = abDistribution.test || 0;
    const completedOnboarding = onboardingFunnel.find(s => s.step === 'complete')?.count || 0;
    const onboardingPct = testUsers > 0 ? Math.round(completedOnboarding / testUsers * 100) : 0;

    document.getElementById('kpi-total').textContent = total;
    document.getElementById('kpi-control').textContent = abDistribution.control || 0;
    document.getElementById('kpi-control-pct').textContent = total > 0 ? `${Math.round(abDistribution.control/total*100)}% distribution` : '—';
    document.getElementById('kpi-test').textContent = testUsers;
    document.getElementById('kpi-test-pct').textContent = total > 0 ? `${Math.round(testUsers/total*100)}% distribution` : '—';
    document.getElementById('kpi-onboarding').textContent = `${onboardingPct}%`;

    // Activity Chart
    const ctx = document.getElementById('mealsChart').getContext('2d');
    if (mealsChart) mealsChart.destroy();
    
    mealsChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: dailyMeals.map(d => {
           const dt = new Date(d.date + 'T12:00:00');
           return dt.toLocaleDateString('en-US', { weekday: 'short' });
        }),
        datasets: [{
          label: 'Meals',
          data: dailyMeals.map(d => d.count),
          borderColor: '#22c55e',
          borderWidth: 3,
          backgroundColor: (ctx) => {
            const gradient = ctx.chart.ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(34, 197, 94, 0.2)');
            gradient.addColorStop(1, 'transparent');
            return gradient;
          },
          fill: true,
          tension: 0.4,
          pointRadius: 0,
          pointHoverRadius: 6,
          pointHoverBackgroundColor: '#22c55e',
          pointHoverBorderColor: '#fff',
          pointHoverBorderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { 
            grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
            ticks: { color: '#6b7280', font: { family: 'Outfit', size: 11 } }
          },
          x: { 
            grid: { display: false },
            ticks: { color: '#6b7280', font: { family: 'Outfit', size: 11 } }
          }
        }
      }
    });

    // Funnel
    const funnelContainer = document.getElementById('funnel-container');
    const maxCount = onboardingFunnel[0]?.count || 1;
    
    funnelContainer.innerHTML = onboardingFunnel.map((s, i) => {
      const pct = maxCount > 0 ? Math.round(s.count / maxCount * 100) : 0;
      return `
        <div class="funnel-item">
          <div class="funnel-row">
            <span class="funnel-name">${s.step}</span>
            <div class="funnel-track">
              <div class="funnel-fill" style="width: ${pct}%"></div>
            </div>
            <span class="funnel-stats">${s.count}</span>
            <span class="funnel-pct">${pct}%</span>
          </div>
        </div>
      `;
    }).join('');
  }

  loadData();
  setInterval(loadData, 30000);
</script>

</body>
</html>
